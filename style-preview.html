    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'Outfit', -apple-system, sans-serif;
      background: #050507;
      color: #fff;
      min-height: 100vh;
      padding: 36px 24px 72px;
    }

    .page-header { max-width: 1400px; margin: 0 auto 44px; text-align: center; }
    .page-header h1 { font-size: 26px; font-weight: 800; letter-spacing: -0.5px; margin-bottom: 8px; }
    .page-header p { font-size: 14px; color: #555; max-width: 520px; margin: 0 auto; line-height: 1.65; }
    .tags { display: flex; align-items: center; justify-content: center; gap: 8px; margin-bottom: 14px; flex-wrap: wrap; }
    .tag {
      display: inline-flex; align-items: center; gap: 5px;
      font-size: 11px; font-weight: 700; padding: 4px 12px;
      border-radius: 20px; letter-spacing: 0.4px;
    }
    .tag-slate { background: rgba(79,70,229,0.15); border: 1px solid rgba(79,70,229,0.3); color: #a5b4fc; }
    .tag-outfit { background: rgba(255,255,255,0.06); border: 1px solid rgba(255,255,255,0.12); color: #9ca3af; }

    .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(296px, 1fr)); gap: 36px; max-width: 1400px; margin: 0 auto; }

    .style-card { display: flex; flex-direction: column; gap: 14px; }
    .style-label { display: flex; align-items: flex-start; gap: 10px; }
    .style-num { font-size: 10px; font-weight: 800; padding: 2px 7px; border-radius: 6px; letter-spacing: 0.5px; margin-top: 3px; flex-shrink: 0; }
    .style-info { flex: 1; }
    .style-name { font-size: 16px; font-weight: 700; color: #fff; line-height: 1.2; }
    .style-desc { font-size: 12px; color: #555; margin-top: 3px; line-height: 1.45; }
    .style-palette { display: flex; gap: 5px; margin-top: 7px; }
    .swatch { width: 20px; height: 8px; border-radius: 4px; }

    .phone {
      width: 100%; max-width: 312px; height: 590px; margin: 0 auto;
      border-radius: 36px; overflow: hidden;
      box-shadow: 0 12px 48px rgba(0,0,0,0.7), 0 0 0 1px rgba(255,255,255,0.06);
    }
    .phone-inner { width: 100%; height: 100%; overflow-y: auto; scrollbar-width: none; font-family: 'Outfit', sans-serif; }
    .phone-inner::-webkit-scrollbar { display: none; }

    .vote-btn {
      width: 100%; max-width: 312px; margin: 0 auto; display: block;
      background: rgba(255,255,255,0.05); border: 1px solid rgba(255,255,255,0.09);
      color: #6b7280; font-size: 13px; font-weight: 600; padding: 11px 16px;
      border-radius: 14px; cursor: pointer; transition: all 0.15s ease;
      font-family: 'Outfit', sans-serif; text-align: center;
    }
    .vote-btn:hover { background: rgba(255,255,255,0.1); color: #e5e7eb; border-color: rgba(255,255,255,0.18); }
    .vote-btn.selected { background: #4f46e5; border-color: #4f46e5; color: #fff; }

    /* ── Phone UI elements (vars injected per theme) ── */
    .pc { min-height: 100%; font-family: 'Outfit', sans-serif; background: var(--bg); }

    .ph {
      position: sticky; top: 0; z-index: 10;
      display: flex; align-items: center; justify-content: space-between;
      padding: 12px 16px; border-bottom: 1px solid var(--border); background: var(--surface);
    }
    .ph-logo { display: flex; align-items: center; gap: 6px; font-weight: 800; font-size: 15px; color: var(--text); }
    .ph-badge { font-size: 10px; font-weight: 700; padding: 3px 9px; border-radius: 20px; background: var(--accent-soft); color: var(--accent); }

    .pm { padding: 12px 12px 80px; display: flex; flex-direction: column; gap: 10px; background: var(--bg); }

    .ec { background: var(--surface); border: 1px solid var(--border); border-radius: 14px; overflow: hidden; box-shadow: var(--shadow); }
    .ec-top { padding: 14px 14px 10px; }
    .ec-eyebrow { font-size: 9px; font-weight: 700; text-transform: uppercase; letter-spacing: 1.2px; color: var(--muted); margin-bottom: 2px; }
    .ec-title { font-size: 16px; font-weight: 800; color: var(--text); letter-spacing: -0.3px; line-height: 1.25; }
    .ec-date { font-size: 11px; color: var(--muted); margin-top: 4px; }

    .ec-amount { padding: 10px 14px 12px; border-top: 1px solid var(--border); }
    .ec-amount-lbl { font-size: 9px; font-weight: 700; text-transform: uppercase; letter-spacing: 1px; color: var(--muted); margin-bottom: 2px; }
    .ec-amount-num { font-size: 36px; font-weight: 900; color: var(--text); letter-spacing: -1.5px; line-height: 1; }

    .ec-stats { display: grid; grid-template-columns: 1fr 1fr 1fr; border-top: 1px solid var(--border); }
    .ec-stat { padding: 8px 6px; text-align: center; border-right: 1px solid var(--border); }
    .ec-stat:last-child { border-right: none; }
    .ec-stat-lbl { font-size: 8px; font-weight: 700; text-transform: uppercase; letter-spacing: 0.8px; margin-bottom: 1px; }
    .ec-stat-val { font-size: 12px; font-weight: 800; }
    .st-accent .ec-stat-lbl { color: var(--accent); } .st-accent .ec-stat-val { color: var(--text); }
    .st-green .ec-stat-lbl { color: var(--success); } .st-green .ec-stat-val { color: var(--success); }
    .st-red .ec-stat-lbl { color: var(--danger); } .st-red .ec-stat-val { color: var(--danger); }

    .ec-prog { padding: 10px 14px; border-top: 1px solid var(--border); }
    .ec-prog-meta { display: flex; justify-content: space-between; font-size: 10px; color: var(--muted); margin-bottom: 6px; }
    .ec-prog-pct { font-weight: 700; color: var(--accent); }
    .ec-prog-track { height: 5px; background: var(--border); border-radius: 99px; overflow: hidden; }
    .ec-prog-fill { height: 100%; background: var(--accent); border-radius: 99px; }

    .share { background: var(--surface); border: 1px solid var(--border); border-radius: 14px; padding: 12px 14px; box-shadow: var(--shadow); }
    .share-lbl { font-size: 11px; font-weight: 700; color: var(--text); margin-bottom: 8px; }
    .share-row { display: flex; align-items: center; justify-content: space-between; background: var(--bg); border: 1px solid var(--border); border-radius: 10px; padding: 8px 12px; }
    .share-code { font-family: monospace; font-size: 18px; font-weight: 800; letter-spacing: 3px; color: var(--accent); }
    .share-btn { font-size: 10px; font-weight: 700; padding: 4px 10px; border-radius: 8px; background: var(--accent); color: var(--accent-fg); border: none; cursor: pointer; }

    .tabs { display: flex; gap: 3px; padding: 3px; background: var(--bg); border: 1px solid var(--border); border-radius: 14px; }
    .tab { flex: 1; text-align: center; font-size: 10px; font-weight: 700; padding: 6px 2px; border-radius: 10px; color: var(--muted); }
    .tab.active { background: var(--surface); color: var(--text); box-shadow: 0 1px 4px rgba(0,0,0,0.3); }

    .parts { display: flex; flex-direction: column; gap: 6px; }
    .prow { display: flex; align-items: center; gap: 10px; background: var(--surface); border: 1px solid var(--border); border-radius: 14px; padding: 10px 12px; box-shadow: var(--shadow); }
    .prow.paid { background: var(--success-bg); border-color: var(--success-border); }
    .prow.wait { background: var(--warn-bg); border-color: var(--warn-border); }
    .prow.me { border-color: var(--accent); border-width: 1.5px; }

    .pav { width: 34px; height: 34px; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 11px; font-weight: 800; flex-shrink: 0; }
    .av-green { background: var(--success); color: #fff; }
    .av-amber { background: #d97706; color: #fff; }
    .av-accent { background: var(--accent); color: var(--accent-fg); }
    .av-muted { background: var(--border); color: var(--muted); }

    .pinfo { flex: 1; }
    .pname { font-size: 12px; font-weight: 700; color: var(--text); }
    .pamount { font-size: 11px; font-weight: 600; }
    .pa-green { color: var(--success); }
    .pa-amber { color: #f59e0b; }
    .pa-muted { color: var(--muted); }

    .pact { font-size: 10px; font-weight: 700; padding: 5px 10px; border-radius: 8px; border: none; cursor: pointer; white-space: nowrap; }
    .act-green { background: var(--success-bg); color: var(--success); border: 1px solid var(--success-border); }
    .act-amber { background: var(--warn-bg); color: #d97706; border: 1px solid var(--warn-border); }
    .act-accent { background: var(--accent); color: var(--accent-fg); }

    .pbot { position: sticky; bottom: 0; background: var(--surface); border-top: 1px solid var(--border); padding: 10px 12px; }
    .pcta { width: 100%; background: var(--accent); color: var(--accent-fg); font-size: 13px; font-weight: 700; padding: 12px; border-radius: 12px; border: none; cursor: pointer; text-align: center; display: block; font-family: 'Outfit', sans-serif; }

    #selected-list { font-size: 16px; font-weight: 700; color: #fff; }

    @media (max-width: 640px) {
      .grid { grid-template-columns: 1fr; }
      body { padding: 20px 16px 48px; }

};

const grid = document.getElementById('grid');
const selected = new Set();

themes.forEach(t => {
  const num = String(t.id).padStart(2, '0');
  const accentColor = t.vars['--accent'];
  const card = document.createElement('div');
  card.className = 'style-card';

  const swatches = t.palette.map(c =>
    `<div class="swatch" style="background:${c}"></div>`
  ).join('');

  card.innerHTML = `
    <div class="style-label">
      <div class="style-num" style="background:${accentColor}22;color:${accentColor};border:1px solid ${accentColor}44">${num}</div>
      <div class="style-info">
        <div class="style-name">${t.name}</div>
        <div class="style-desc">${t.desc}</div>
        <div class="style-palette">${swatches}</div>
      </div>
    </div>
    <div class="phone">
      <div class="phone-inner">${phoneHTML(t.vars)}</div>
    </div>
    <button class="vote-btn" onclick="vote(this,'${num} · ${t.name}')">Me gusta este dark →</button>
  `;
  grid.appendChild(card);
});

function vote(btn, label) {
  if (btn.classList.contains('selected')) {
    btn.classList.remove('selected');
    btn.textContent = 'Me gusta este dark →';
    selected.delete(label);
  } else {
    btn.classList.add('selected');
    btn.textContent = '✓ Seleccionado';
    selected.add(label);
  }
  const summary = document.getElementById('summary');
  const list = document.getElementById('selected-list');
  if (selected.size > 0) {
    summary.style.display = 'block';
    list.textContent = [...selected].join('  ·  ');
  } else {
    summary.style.display = 'none';
  }
}
</script>
